version: "3.8"

services:
  db:
    image: ankane/pgvector:latest
    container_name: thinktank-db
    environment:
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: aipass
      POSTGRES_DB: thinktank
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai -d thinktank"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: thinktank-api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - model-cache:/models
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ai:aipass@db:5432/thinktank
      - API_SECRET=${API_SECRET:-dev-key}
      - JWT_SECRET=${JWT_SECRET:-thinktank-jwt-secret-change-in-production}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.moonshot.cn/v1}
      - LLM_MODEL=${LLM_MODEL:-moonshot-v1-8k}
      - EMBEDDING_MODEL_PATH=/models
      - UPLOAD_DIR=/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  model-cache:
